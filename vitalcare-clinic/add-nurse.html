<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalCare - Add Nurse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="navbar">
                <a href="homepage.html" class="logo">VitalCare</a>
                <ul class="nav-links">
                    <li><a href="admin-dashboard.html">Dashboard</a></li>
                    <li><a href="admin-appointments.html">Appointments</a></li>
                    <li><a href="admin-staff.html">Manage Staffs</a></li>
                    <li><a href="admin-add-doctor.html">Add Doctor</a></li>
                    <li><a href="add-nurse.html" class="active">Add Nurse</a></li>
                </ul>
                <div class="user-info">
                    <span>Welcome, Admin</span>
                    <a href="homepage.html" class="btn btn-danger">Log Out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-content">
            <h1>VitalCare</h1>
            
            <div class="form-container">
                <h2>Add Nurse</h2>
                
                <form class="staff-form">
                    <div class="form-section">
                        <h3>Upload Nurse Picture</h3>
                        <div class="upload-area">
                            <div class="upload-placeholder">
                                <span>Click to upload photo</span>
                            </div>
                            <input type="file" accept="image/*" style="display: none;">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nurse-name">Nurse name</label>
                            <input type="text" id="nurse-name" placeholder="Name" required>
                        </div>
                        <div class="form-group">
                            <label for="nurse-email">Nurse email</label>
                            <input type="email" id="nurse-email" placeholder="Email" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nurse-password">Nurse password</label>
                            <input type="password" id="nurse-password" placeholder="Password" required>
                        </div>
                        <div class="form-group">
                            <label for="experience">Experience</label>
                            <input type="text" id="experience" placeholder="Years of experience" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="speciality">Speciality</label>
                            <input type="text" id="speciality" placeholder="Speciality" required>
                        </div>
                        <div class="form-group">
                            <label for="education">Education</label>
                            <input type="text" id="education" placeholder="Education" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" placeholder="Address 1" required>
                        <input type="text" id="address2" placeholder="Address 2" style="margin-top: 10px;">
                    </div>

                    <div class="form-group">
                        <label for="about">About me</label>
                        <textarea id="about" rows="4" placeholder="Tell us about the nurse"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn" onclick="addNurse()">Add Nurse</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        function addNurse() {
            const name = document.getElementById('nurse-name').value;
            const email = document.getElementById('nurse-email').value;
            
            if (!name || !email) {
                alert('Please fill in all required fields.');
                return;
            }
            
            alert('Nurse added successfully!');
            window.location.href = 'admin-staff.html';
        }
        
        // Upload photo functionality
        document.querySelector('.upload-area').addEventListener('click', function() {
            this.querySelector('input[type="file"]').click();
        });
    </script>

    <style>
        .form-container {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .upload-area:hover {
            border-color: var(--primary);
        }
        
        .upload-placeholder {
            color: #666;
        }
        
        .staff-form {
            margin-top: 20px;
        }
        
        .form-actions {
            text-align: center;
            margin-top: 30px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }
        }
    </style>
</body>
</html>
