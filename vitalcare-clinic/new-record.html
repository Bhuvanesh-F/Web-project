<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalCare - New Medical Record</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="navbar">
                <a href="homepage.html" class="logo">VitalCare</a>
                <ul class="nav-links">
                    <li><a href="doctor-dashboard.html">Dashboard</a></li>
                    <li><a href="medical-records.html">Medical Records</a></li>
                    <li><a href="doctor-schedule.html">Schedule</a></li>
                    <li><a href="doctor-profile.html">Profile</a></li>
                </ul>
                <div class="user-info">
                    <span>Welcome, Dr. Smith</span>
                    <a href="homepage.html" class="btn btn-danger">Log Out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-content">
            <h1>New Record</h1>
            
            <form class="medical-record-form">
                <div class="form-group">
                    <label for="patient-select">Patient</label>
                    <select id="patient-select" required>
                        <option value="">Select Patient</option>
                        <option value="patient1">Mr. Patient (ID: 111112)</option>
                        <option value="patient2">Mrs. Patient (ID: 111113)</option>
                        <option value="patient3">Ms. Patient (ID: 111114)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="record-date">Date</label>
                    <input type="date" id="record-date" required>
                </div>
                
                <div class="form-group">
                    <label for="diagnosis">Diagnosis</label>
                    <textarea id="diagnosis" rows="3" placeholder="Enter diagnosis" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="treatment">Treatment</label>
                    <textarea id="treatment" rows="3" placeholder="Enter treatment details" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="prescription">Prescription</label>
                    <textarea id="prescription" rows="3" placeholder="Enter prescription details" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" rows="3" placeholder="Additional notes"></textarea>
                </div>
                
                <div class="form-actions">
                    <a href="medical-records.html" class="btn btn-secondary">Cancel</a>
                    <button type="button" class="btn" onclick="addNewRecord()">Add record</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function addNewRecord() {
            const patient = document.getElementById('patient-select').value;
            const date = document.getElementById('record-date').value;
            const diagnosis = document.getElementById('diagnosis').value;
            
            if (!patient || !date || !diagnosis) {
                alert('Please fill in all required fields.');
                return;
            }
            
            alert('Medical record added successfully!');
            window.location.href = 'medical-records.html';
        }
    </script>

    <style>
        .medical-record-form {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
        }
        
        .form-actions .btn {
            width: auto;
            min-width: 120px;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
    </style>
</body>
</html>
