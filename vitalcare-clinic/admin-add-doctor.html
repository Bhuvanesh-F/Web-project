<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalCare - Add Doctor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="navbar">
                <a href="homepage.html" class="logo">VitalCare</a>
                <ul class="nav-links">
                    <li><a href="admin-overview.html">Dashboard</a></li>
                    <li><a href="admin-appointments.html">Appointments</a></li>
                    <li><a href="admin-staff.html">Manage Staffs</a></li>
                    <li><a href="admin-add-doctor.html" class="active">Add Doctor</a></li>
                    <li><a href="admin-pets.html">Pets registered</a></li>
                </ul>
                <div class="user-info">
                    <span>Welcome, Admin</span>
                    <a href="homepage.html" class="btn btn-danger">Log Out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-content">
            <h1>VitalCare</h1>
            
            <div class="form-container">
                <h2>Add Doctor</h2>
                
                <form class="doctor-form">
                    <div class="form-section">
                        <h3>Upload Doctor Picture</h3>
                        <div class="upload-area">
                            <div class="upload-placeholder">
                                <span>Click to upload photo</span>
                            </div>
                            <input type="file" accept="image/*" style="display: none;">
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="admin-doctor-name">Doctor name</label>
                            <input type="text" id="admin-doctor-name" placeholder="Name" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-doctor-speciality">Speciality</label>
                            <input type="text" id="admin-doctor-speciality" placeholder="Speciality" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-doctor-email">Doctor email</label>
                            <input type="email" id="admin-doctor-email" placeholder="Email" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-doctor-education">Education</label>
                            <input type="text" id="admin-doctor-education" placeholder="Education" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-doctor-password">Doctor password</label>
                            <input type="password" id="admin-doctor-password" placeholder="Password" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-doctor-address">Address</label>
                            <input type="text" id="admin-doctor-address" placeholder="Address 1" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-doctor-experience">Experience</label>
                            <input type="text" id="admin-doctor-experience" placeholder="Years of experience" required>
                        </div>
                        <div class="form-group">
                            <label for="admin-doctor-address2">Address 2</label>
                            <input type="text" id="admin-doctor-address2" placeholder="Address 2">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="admin-doctor-fees">Fees</label>
                        <input type="text" id="admin-doctor-fees" placeholder="Consultation fees" required>
                    </div>

                    <div class="form-group">
                        <label for="admin-doctor-about">About me</label>
                        <textarea id="admin-doctor-about" rows="4" placeholder="Tell us about the doctor"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn" onclick="addDoctorAdmin()">Add Doctor</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        function addDoctorAdmin() {
            const name = document.getElementById('admin-doctor-name').value;
            const email = document.getElementById('admin-doctor-email').value;
            const speciality = document.getElementById('admin-doctor-speciality').value;
            
            if (!name || !email || !speciality) {
                alert('Please fill in all required fields.');
                return;
            }
            
            alert('Doctor added successfully!');
            window.location.href = 'admin-staff.html';
        }
        
        // Upload photo functionality
        document.querySelector('.upload-area').addEventListener('click', function() {
            this.querySelector('input[type="file"]').click();
        });
    </script>

    <style>
        .form-container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .upload-area:hover {
            border-color: var(--primary);
        }
        
        .upload-placeholder {
            color: #666;
        }
        
        .doctor-form {
            margin-top: 20px;
        }
        
        .form-actions {
            text-align: center;
            margin-top: 30px;
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>
</html>
